global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: user-service
    static_configs:
      - targets: ["user-service:8081"]

  - job_name: file-service
    static_configs:
      - targets: ["file-service:8082"]

  - job_name: processing-service
    static_configs:
      - targets: ["processing-service:8083"]

  - job_name: library-service
    static_configs:
      - targets: ["library-service:8084"]

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: jaeger
    metrics_path: /metrics
    static_configs:
      - targets: ["jaeger:14269"]

  - job_name: consul
    metrics_path: /v1/agent/metrics
    params:
      format: ["prometheus"]
    static_configs:
      - targets: ["consul:8500"]
